<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basan | Engineering Portfolio</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1117; color: #c9d1d9; margin: 0; padding: 40px; }
        .container { max-width: 1000px; margin: auto; }
        header { border-bottom: 1px solid #30363d; padding-bottom: 20px; margin-bottom: 40px; }
        h1 { color: #58a6ff; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card-link { text-decoration: none; color: inherit; display: block; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: #58a6ff; transform: translateY(-5px); box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .card img { width: 100%; border-radius: 4px; height: 200px; object-fit: cover; background: #000; }
        .card h3 { margin: 15px 0 10px 0; color: #f0f6fc; }
        .card p { font-size: 14px; color: #8b949e; line-height: 1.5; margin-bottom: 20px; }
        .view-btn { color: #58a6ff; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Basan Ali Aziz</h1>
            <p>Mechatronics & Electromobility | Engineering Portfolio</p>
        </header>

        <div class="grid">
            
            <a href="lithophane.html" class="card-link">
                <div class="card">
                    <img src="https://via.placeholder.com/600x400/161b22/8b949e?text=Lithophane+Lamp" alt="Lithophane Lamp">
                    <h3>Lithophane Lamp</h3>
                    <p>Custom 3D printed lithophane, electronics integration, and enclosure design.</p>
                    <span class="view-btn">View Projects →</span>
                </div>
            </a>

            <a href="cnc-plotter.html" class="card-link">
                <div class="card">
                    <img src="Eren Gif.gif" alt="CNC Plotter">
                    <h3>CNC Pen Plotter</h3>
                    <p>Custom built hardware, SolidWorks modeling, and generative art toolpaths.</p>
                    <span class="view-btn">View Projects →</span>
                </div>
            </a>

        </div>
    </div>
</body>
</html>
